# ============================================
# MyTrackify — GitLab CI/CD Pipeline (Kubernetes)
# ============================================
# Stages:
#   1. build   — Compile backend (Maven) + frontend (Vite)
#   2. test    — Run backend unit tests + frontend lint
#   3. docker  — Build & push Docker images to GitLab Container Registry
#   4. deploy  — Deploy to Kubernetes cluster (manual trigger)
# ============================================

stages:
  - build
  - test
  - docker
  - deploy

# --------------------------------------------
# Global variables
# --------------------------------------------
variables:
  # Registry images
  BACKEND_IMAGE: "${CI_REGISTRY_IMAGE}/backend"
  FRONTEND_IMAGE: "${CI_REGISTRY_IMAGE}/frontend"
  # Kubernetes
  KUBE_NAMESPACE: "mytrackify"
  # Docker-in-Docker
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_TLS_VERIFY: 1
  DOCKER_CERT_PATH: "/certs/client"

# --------------------------------------------
# Cache — speed up repeated pipeline runs
# --------------------------------------------
.maven-cache: &maven-cache
  key:
    files:
      - backend/pom.xml
  paths:
    - backend/.m2/repository/

.npm-cache: &npm-cache
  key:
    files:
      - frontend/package-lock.json
  paths:
    - frontend/node_modules/

# ============================================
# BUILD STAGE
# ============================================

build-backend:
  stage: build
  image: maven:3.9.6-eclipse-temurin-17-alpine
  <<: *maven-cache
  script:
    - cd backend
    - mvn compile -B -DskipTests
  artifacts:
    paths:
      - backend/target/
    expire_in: 1 hour
  cache:
    <<: *maven-cache
    policy: pull-push

build-frontend:
  stage: build
  image: node:20-alpine
  <<: *npm-cache
  script:
    - cd frontend
    - npm ci --prefer-offline
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour
  cache:
    <<: *npm-cache
    policy: pull-push

# ============================================
# TEST STAGE
# ============================================

test-backend:
  stage: test
  image: maven:3.9.6-eclipse-temurin-17-alpine
  needs:
    - build-backend
  cache:
    <<: *maven-cache
    policy: pull
  script:
    - cd backend
    - mvn test -B
  artifacts:
    reports:
      junit:
        - backend/target/surefire-reports/TEST-*.xml
    expire_in: 7 days
  coverage: '/Total.*?([0-9]{1,3})%/'

test-frontend:
  stage: test
  image: node:20-alpine
  needs:
    - build-frontend
  cache:
    <<: *npm-cache
    policy: pull
  script:
    - cd frontend
    - npm run lint -- --max-warnings=0

# ============================================
# DOCKER STAGE — Build & push images
# ============================================

.docker-login: &docker-login
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY

docker-build-backend:
  stage: docker
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  needs:
    - build-backend
    - test-backend
  <<: *docker-login
  script:
    - cd backend
    - mvn package -DskipTests -B
    - |
      docker build \
        -t ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA} \
        -t ${BACKEND_IMAGE}:latest \
        -f ../docker/backend.Dockerfile .
    - docker push ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${BACKEND_IMAGE}:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

docker-build-frontend:
  stage: docker
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  needs:
    - build-frontend
    - test-frontend
  <<: *docker-login
  script:
    - cd frontend
    - |
      docker build \
        -t ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA} \
        -t ${FRONTEND_IMAGE}:latest \
        -f ../docker/frontend.Dockerfile .
    - docker push ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${FRONTEND_IMAGE}:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ============================================
# DEPLOY STAGE — Kubernetes rollout
# ============================================

deploy-staging:
  stage: deploy
  image: bitnami/kubectl:1.29
  needs:
    - docker-build-backend
    - docker-build-frontend
  environment:
    name: staging
    url: https://staging.mytrackify.com
  before_script:
    - mkdir -p ~/.kube
    - echo "${KUBE_CONFIG}" | base64 -d > ~/.kube/config
    - kubectl config use-context ${KUBE_CONTEXT_STAGING}
  script:
    - |
      echo "=== Deploying to Staging ==="
      echo "Backend image: ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      echo "Frontend image: ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}"

    # Apply namespace
    - kubectl apply -f k8s/namespace.yml

    # Apply secrets (idempotent)
    - kubectl apply -f k8s/secrets.yml

    # Apply configmap
    - kubectl apply -f k8s/configmap.yml

    # Apply database (StatefulSet — only created once, safe to re-apply)
    - kubectl apply -f k8s/postgres.yml

    # Wait for DB to be ready
    - kubectl rollout status statefulset/mytrackify-db -n ${KUBE_NAMESPACE} --timeout=120s || true

    # Apply backend with new image (substitute both tag and full image path)
    - |
      cat k8s/backend.yml | \
        sed "s|image:.*backend.*|image: ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}|" | \
        kubectl apply -f -

    # Apply frontend with new image (substitute both tag and full image path)
    - |
      cat k8s/frontend.yml | \
        sed "s|image:.*frontend.*|image: ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}|" | \
        kubectl apply -f -

    # Apply ingress
    - kubectl apply -f k8s/ingress.yml

    # Wait for rollouts
    - kubectl rollout status deployment/mytrackify-backend -n ${KUBE_NAMESPACE} --timeout=300s
    - kubectl rollout status deployment/mytrackify-frontend -n ${KUBE_NAMESPACE} --timeout=120s

    # Verify
    - kubectl get pods -n ${KUBE_NAMESPACE}
    - kubectl get svc -n ${KUBE_NAMESPACE}
    - kubectl get ingress -n ${KUBE_NAMESPACE}
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

deploy-production:
  stage: deploy
  image: bitnami/kubectl:1.29
  needs:
    - docker-build-backend
    - docker-build-frontend
  environment:
    name: production
    url: https://mytrackify.com
  before_script:
    - mkdir -p ~/.kube
    - echo "${KUBE_CONFIG}" | base64 -d > ~/.kube/config
    - kubectl config use-context ${KUBE_CONTEXT_PRODUCTION}
  script:
    - |
      echo "=== Deploying to Production ==="
      echo "Backend image: ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      echo "Frontend image: ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}"

    # Apply namespace
    - kubectl apply -f k8s/namespace.yml

    # Apply secrets
    - kubectl apply -f k8s/secrets.yml

    # Apply configmap
    - kubectl apply -f k8s/configmap.yml

    # Apply database
    - kubectl apply -f k8s/postgres.yml
    - kubectl rollout status statefulset/mytrackify-db -n ${KUBE_NAMESPACE} --timeout=120s || true

    # Apply backend with new image (substitute both tag and full image path)
    - |
      cat k8s/backend.yml | \
        sed "s|image:.*backend.*|image: ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}|" | \
        kubectl apply -f -

    # Apply frontend with new image (substitute both tag and full image path)
    - |
      cat k8s/frontend.yml | \
        sed "s|image:.*frontend.*|image: ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}|" | \
        kubectl apply -f -

    # Apply ingress
    - kubectl apply -f k8s/ingress.yml

    # Wait for rollouts
    - kubectl rollout status deployment/mytrackify-backend -n ${KUBE_NAMESPACE} --timeout=300s
    - kubectl rollout status deployment/mytrackify-frontend -n ${KUBE_NAMESPACE} --timeout=120s

    # Verify
    - kubectl get pods -n ${KUBE_NAMESPACE}
    - kubectl get svc -n ${KUBE_NAMESPACE}
    - kubectl get ingress -n ${KUBE_NAMESPACE}
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  allow_failure: false
