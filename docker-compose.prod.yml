# ============================================
# MyTrackify — Production Docker Compose
# ============================================
# Usage: docker compose -f docker-compose.prod.yml up -d
# ============================================

version: "3.9"

services:
  # ------------------------------------------
  # PostgreSQL Database
  # ------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mytrackify}
      POSTGRES_USER: ${POSTGRES_USER:-mytrackify_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mytrackify_pass_2025}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mytrackify_admin} -d ${POSTGRES_DB:-mytrackify}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mytrackify-net

  # ------------------------------------------
  # Spring Boot Backend
  # ------------------------------------------
  backend:
    image: ${CI_REGISTRY_IMAGE}/backend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-mytrackify}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-mytrackify_admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-mytrackify_pass_2025}
      APP_JWT_SECRET: ${JWT_SECRET:-change-this-to-a-256-bit-secret-key-in-production}
      APP_JWT_EXPIRATION_MS: 86400000
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mytrackify-net

  # ------------------------------------------
  # React Frontend (Nginx)
  # ------------------------------------------
  frontend:
    image: ${CI_REGISTRY_IMAGE}/frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - mytrackify-net

  # ------------------------------------------
  # Certbot (SSL) — optional, run on demand
  # ------------------------------------------
  certbot:
    image: certbot/certbot:latest
    profiles:
      - ssl
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
    driver: local

networks:
  mytrackify-net:
    driver: bridge
