# ============================================
# ConfigMap — Non-sensitive configuration
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: mytrackify-config
  namespace: mytrackify
  labels:
    app: mytrackify
data:
  # Backend config
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"
  # PostgreSQL host will be the service name in the cluster
  SPRING_DATASOURCE_URL: "jdbc:postgresql://mytrackify-db:5432/mytrackify"
  APP_JWT_EXPIRATION_MS: "86400000"
  # Actuator
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
  # Frontend config (used at runtime by nginx)
  VITE_API_URL: "/api/v1"
