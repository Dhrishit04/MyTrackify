# ============================================
# Frontend — React + Nginx Deployment
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mytrackify-frontend
  namespace: mytrackify
  labels:
    app: mytrackify
    component: frontend
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mytrackify
      component: frontend
  template:
    metadata:
      labels:
        app: mytrackify
        component: frontend
    spec:
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: frontend
          image: ${CI_REGISTRY_IMAGE}/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
# ClusterIP service for frontend
apiVersion: v1
kind: Service
metadata:
  name: mytrackify-frontend
  namespace: mytrackify
  labels:
    app: mytrackify
    component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: mytrackify
    component: frontend
---
# HPA — Auto-scale frontend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mytrackify-frontend-hpa
  namespace: mytrackify
  labels:
    app: mytrackify
    component: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mytrackify-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
