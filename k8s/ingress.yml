# ============================================
# Ingress — External traffic routing
# ============================================
# Routes:
#   /*        → frontend (React SPA)
#   /api/*    → backend  (Spring Boot)
# ============================================
# Prerequisites:
#   - NGINX Ingress Controller installed in the cluster
#   - cert-manager installed for automatic TLS
#   - Update the `host` field to your actual domain
# ============================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mytrackify-ingress
  namespace: mytrackify
  labels:
    app: mytrackify
  annotations:
    # NGINX Ingress Controller
    kubernetes.io/ingress.class: nginx
    # cert-manager for automatic Let's Encrypt TLS
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Proxy settings
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "5"
    # CORS headers
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://mytrackify.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    # Redirect HTTP → HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - mytrackify.com
        - www.mytrackify.com
      secretName: mytrackify-tls
  rules:
    - host: mytrackify.com
      http:
        paths:
          # API routes → backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: mytrackify-backend
                port:
                  number: 8080
          # Everything else → frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mytrackify-frontend
                port:
                  number: 80
    - host: www.mytrackify.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mytrackify-frontend
                port:
                  number: 80
---
# ============================================
# ClusterIssuer — Let's Encrypt (cert-manager)
# ============================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@mytrackify.com  # ← Update to your email
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
