# ============================================
# Kustomize — Base configuration
# ============================================
# Usage: kubectl apply -k k8s/
# ============================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mytrackify

resources:
  - namespace.yml
  - secrets.yml
  - configmap.yml
  - postgres.yml
  - backend.yml
  - frontend.yml
  - ingress.yml

commonLabels:
  app: mytrackify
  managed-by: kustomize
