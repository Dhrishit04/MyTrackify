# ============================================
# PostgreSQL — StatefulSet with persistent storage
# ============================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mytrackify-db
  namespace: mytrackify
  labels:
    app: mytrackify
    component: database
spec:
  serviceName: mytrackify-db
  replicas: 1
  selector:
    matchLabels:
      app: mytrackify
      component: database
  template:
    metadata:
      labels:
        app: mytrackify
        component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: mytrackify-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mytrackify-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mytrackify-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "mytrackify_admin", "-d", "mytrackify"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "mytrackify_admin", "-d", "mytrackify"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path  # Adjust to your cluster's StorageClass (e.g., gp2, managed-csi, standard)
        resources:
          requests:
            storage: 10Gi
---
# Headless service for PostgreSQL StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: mytrackify-db
  namespace: mytrackify
  labels:
    app: mytrackify
    component: database
spec:
  type: ClusterIP
  clusterIP: None  # Headless for StatefulSet
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app: mytrackify
    component: database
