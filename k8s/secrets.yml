# ============================================
# Secrets — Sensitive configuration
# ============================================
# NOTE: These are template placeholders.
# In production, use GitLab CI/CD variables, Sealed Secrets, or an external secrets operator.
# NEVER commit real secrets to git.
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: mytrackify-secrets
  namespace: mytrackify
  labels:
    app: mytrackify
type: Opaque
stringData:
  # PostgreSQL credentials
  POSTGRES_USER: "mytrackify_admin"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  POSTGRES_DB: "mytrackify"
  # JWT signing key — must be at least 256 bits for HS256
  JWT_SECRET: "CHANGE_ME_GENERATE_A_256_BIT_SECRET_FOR_PRODUCTION"
---
# Registry credentials for pulling images from GitLab Container Registry
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-registry
  namespace: mytrackify
  labels:
    app: mytrackify
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "registry.gitlab.com": {
          "username": "${CI_REGISTRY_USER}",
          "password": "${CI_REGISTRY_PASSWORD}"
        }
      }
    }
